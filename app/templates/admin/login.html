<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SciTools Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #003865 0%, #0a4d8c 50%, #003865 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 1rem;
        }
        .login-wrapper {
            width: 100%; max-width: 420px;
        }
        .login-header {
            text-align: center; margin-bottom: 2rem; color: white;
        }
        .login-header .radar-icon {
            width: 64px; height: 64px; background: #FF6B00;
            border-radius: 16px; display: inline-flex; align-items: center;
            justify-content: center; font-size: 1.8rem; margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(255,107,0,0.4);
        }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .login-header p { font-size: 0.9rem; opacity: 0.7; }
        .login-card {
            background: white; padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h2 {
            color: #003865; margin-bottom: 1.5rem; font-size: 1.2rem;
            text-align: center; font-weight: 600;
        }
        .form-group { margin-bottom: 1.25rem; position: relative; }
        .form-group label {
            display: block; color: #555; font-weight: 500;
            margin-bottom: 0.4rem; font-size: 0.85rem;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #aaa; font-size: 0.9rem;
        }
        .input-wrapper input {
            width: 100%; padding: 0.8rem 0.8rem 0.8rem 2.6rem;
            border: 2px solid #E2E8F0; border-radius: 10px;
            font-family: inherit; font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .input-wrapper input:focus {
            outline: none; border-color: #FF6B00;
            box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
        }
        .btn-login {
            width: 100%; padding: 0.9rem; background: #FF6B00;
            color: white; border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            transition: all 0.3s ease; display: flex;
            align-items: center; justify-content: center; gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #E55D00; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,0,0.3); }
        .alert {
            padding: 0.8rem 1rem; margin-bottom: 1rem; border-radius: 10px;
            font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .alert-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
        .back-link {
            text-align: center; margin-top: 1.5rem;
        }
        .back-link a {
            color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back-link a:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="radar-icon"><i class="fas fa-satellite-dish"></i></div>
            <h1>SciTools Radar</h1>
            <p>Panel de Administracion</p>
        </div>

        <div class="login-card">
            <h2><i class="fas fa-lock" style="margin-right:0.5rem;color:#FF6B00;"></i> Iniciar Sesion</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <i class="fas fa-exclamation-circle"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username"
                               placeholder="admin" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
            </form>
        </div>

        <div class="back-link">
            <a href="{{ url_for('main.index') }}"><i class="fas fa-arrow-left"></i> Volver al blog</a>
        </div>
    </div>
</body>
</html>
